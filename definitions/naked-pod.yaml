apiVersion: kubepattern.dev/v1
kind: Pattern
metadata:
  name: naked-pod
  displayName: Naked Pod
  category: Architecture
  severity: HIGH
spec:
  message: "Pod {{target.metadata.name}} in namespace {{target.metadata.namespace}} is not managed by any Deployment or ReplicaSet."

  target:
    kind: Pod
    apiVersion: v1
    filters:
      matchNone:
        - path: "metadata.namespace"
          operator: EQUALS
          values:
            - kube-system
            - kube-public
            - kube-node-lease

  dependencies:
    - id: replicaset
      kind: ReplicaSet
      apiVersion: apps/v1

  relationships:
    matchNone:
      - with: replicaset
        type: custom
        criteria:
          - targetPath: "metadata.ownerReferences[*].uid"
            dependencyPath: "metadata.uid"
            operator: EQUALS
