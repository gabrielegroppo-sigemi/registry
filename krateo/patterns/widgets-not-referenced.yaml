apiVersion: kubepattern.dev/v1
kind: Pattern
metadata:
  name: panel-not-referenced
spec:
  displayName: "Pannello Krateo non Referenziato"
  category: "Architecture"
  severity: MEDIUM
  message: "Il Panel {{target.metadata.name}} nel namespace {{target.metadata.namespace}} non è incluso in alcun layout (Row, Column, TabList o Panel)."
  reference: "https://docs.krateo.io/widgets/panel"
  
  target:
    kind: Panel
    apiVersion: widgets.templates.krateo.io/v1beta1
    plural: panels
    filters:
      matchNone:
        - path: "metadata.namespace"
          operator: EQUALS
          values:
            - krateo-system

  dependencies:
    - id: parent-panel
      kind: Panel
      apiVersion: widgets.templates.krateo.io/v1beta1
      plural: panels
    - id: column
      kind: Column
      apiVersion: widgets.templates.krateo.io/v1beta1
      plural: columns
    - id: row
      kind: Row
      apiVersion: widgets.templates.krateo.io/v1beta1
      plural: rows
    - id: tablist
      kind: TabList
      apiVersion: widgets.templates.krateo.io/v1beta1
      plural: tablists
    - id: page
      kind: Page
      apiVersion: widgets.templates.krateo.io/v1beta1
      plural: pages
    - id: datagrid
      kind: DataGrid
      apiVersion: widgets.templates.krateo.io/v1beta1
      plural: datagrids
    - id: portalblueprintpage
      kind: PortalBlueprintPage
      apiVersion: composition.krateo.io/v1-0-10
      plural: portalblueprintpages

  relationships:
    matchNone:
      - with: parent-panel
        type: custom
        criteria:
          - targetPath: "metadata.name"
            dependencyPath: "spec.resourcesRefs.items[*].name"
            operator: EQUALS
      - with: column
        type: custom
        criteria:
          - targetPath: "metadata.name"
            dependencyPath: "spec.resourcesRefs.items[*].name"
            operator: EQUALS
      - with: row
        type: custom
        criteria:
          - targetPath: "metadata.name"
            dependencyPath: "spec.resourcesRefs.items[*].name"
            operator: EQUALS
      - with: tablist
        type: custom
        criteria:
          - targetPath: "metadata.name"
            dependencyPath: "spec.resourcesRefs.items[*].name"
            operator: EQUALS
      - with: page
        type: custom
        criteria:
        - targetPath: "metadata.name"
          dependencyPath: "spec.resourcesRefs.items[*].name"
          operator: EQUALS
      - with: datagrid
        type: custom
        criteria:
        - targetPath: "metadata.name"
          dependencyPath: "spec.resourcesRefs.items[*].name"
          operator: EQUALS
      - with: portalblueprintpage
        type: custom
        criteria:
        - targetPath: "metadata.name"
          dependencyPath: "status.managed[*].name"
          operator: EQUALS
